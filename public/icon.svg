<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgr" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7FEFFF"/>
      <stop offset="100%" stop-color="#00AAEE"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00AAEE" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#7FEFFF"/>
    </linearGradient>
    <filter id="gl1">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl2">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl3">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bgr)"/>

  <!-- astro text -->
  <text x="240" y="240" text-anchor="middle" font-family="'Arial Rounded MT Bold','Nunito','Quicksand',Arial,sans-serif" font-size="130" font-weight="bold" fill="url(#tg)" letter-spacing="-2">astro</text>

  <!-- Main swoosh -->
  <path d="M80 310 Q140 280 250 320 Q340 350 420 295" stroke="url(#sg)" stroke-width="11" fill="none" stroke-linecap="round" filter="url(#gl3)"/>
  <!-- Thin swoosh -->
  <path d="M100 300 Q160 275 250 310 Q335 338 410 290" stroke="#00AAEE" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Big star sparkle -->
  <g filter="url(#gl2)">
    <path d="M415 280 L420 260 L425 280 L445 285 L425 290 L420 310 L415 290 L395 285 Z" fill="#ffffff"/>
  </g>
  <!-- Glow behind star -->
  <circle cx="420" cy="285" r="25" fill="#00BFFF" opacity="0.15" filter="url(#gl2)"/>

  <!-- Medium sparkles -->
  <g filter="url(#gl1)">
    <path d="M380 340 L382 332 L384 340 L392 342 L384 344 L382 352 L380 344 L372 342 Z" fill="#7FEFFF"/>
  </g>
  <g filter="url(#gl1)">
    <path d="M350 365 L351.5 360 L353 365 L358 366.5 L353 368 L351.5 373 L350 368 L345 366.5 Z" fill="#7FEFFF" opacity="0.7"/>
  </g>

  <!-- Small dots -->
  <circle cx="95" cy="298" r="4" fill="#00BFFF" filter="url(#gl3)" opacity="0.5"/>
  <circle cx="120" cy="308" r="3" fill="#7FEFFF" filter="url(#gl3)" opacity="0.4"/>
  <circle cx="320" cy="358" r="3" fill="#00BFFF" filter="url(#gl3)" opacity="0.4"/>
  <circle cx="400" cy="325" r="2.5" fill="#7FEFFF" filter="url(#gl3)" opacity="0.5"/>
  <circle cx="435" cy="305" r="2" fill="#ffffff" filter="url(#gl3)" opacity="0.3"/>
  <circle cx="145" cy="295" r="2" fill="#ffffff" filter="url(#gl3)" opacity="0.3"/>
</svg>
